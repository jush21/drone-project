<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Drone Ops Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .nav-link-active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, opacity 0.3s ease; opacity: 0; }
        .expandable-content.open { max-height: 300px; opacity: 1; margin-top: 1rem; }
        .intel-report { background: rgba(245, 158, 11, 0.05); border-left: 3px solid #f59e0b; }
        .label-gray { color: #94a3b8; }
        .data-white { color: #ffffff; font-weight: 700; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="scroll-hide">

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 glass-card border-b border-slate-800 px-8 h-16 flex items-center justify-between">
        <div class="flex items-center space-x-12">
            <h1 class="text-lg font-black tracking-tighter uppercase italic text-sky-400">Drone Ops Command</h1>
            <div class="flex space-x-8">
                <button onclick="switchTab('fleet')" id="nav-fleet" class="nav-link-active h-16 text-xs font-black uppercase tracking-widest transition">Fleet Analytics</button>
                <button onclick="switchTab('ops')" id="nav-ops" class="text-slate-500 h-16 text-xs font-black uppercase tracking-widest transition">Operators</button>
                <button onclick="switchTab('intel')" id="nav-intel" class="text-slate-500 h-16 text-xs font-black uppercase tracking-widest transition">Intelligence</button>
            </div>
        </div>
        <div id="status" class="text-[10px] font-bold text-slate-500 uppercase flex items-center">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-2 shadow-[0_0_5px_#22c55e]"></span> Operational
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-8">
        
        <!-- Tab 1: Fleet Analytics -->
        <div id="section-fleet" class="space-y-12">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card p-6 rounded-2xl border-b-4 border-b-sky-500">
                    <p class="text-[10px] font-bold label-gray uppercase tracking-widest mb-1">Total Unit Airtime</p>
                    <h4 id="stat-time" class="text-4xl data-white">0 <span class="text-sm font-normal label-gray lowercase">min</span></h4>
                </div>
                <div class="glass-card p-6 rounded-2xl border-b-4 border-b-amber-500">
                    <p class="text-[10px] font-bold label-gray uppercase tracking-widest mb-1">Detection Events</p>
                    <h4 id="stat-detections" class="text-4xl data-white">0</h4>
                </div>
                <div class="glass-card p-6 rounded-2xl border-b-4 border-b-green-500">
                    <p class="text-[10px] font-bold label-gray uppercase tracking-widest mb-1">Active Assets</p>
                    <h4 id="stat-assets" class="text-4xl data-white">0</h4>
                </div>
                <div class="glass-card p-6 rounded-2xl border-b-4 border-b-purple-500">
                    <p class="text-[10px] font-bold label-gray uppercase tracking-widest mb-1">Detections Rate</p>
                    <h4 id="stat-rate" class="text-4xl data-white">0%</h4>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="text-sm font-black text-white uppercase tracking-widest mb-2 border-l-4 border-sky-500 pl-4">Utilization Distribution</h3>
                    <canvas id="fleetChart" height="300"></canvas>
                </div>
                <div class="lg:col-span-2 glass-card p-8 rounded-3xl">
                    <div class="flex justify-between items-center mb-8">
                        <h3 id="timeline-title" class="text-sm font-black text-white uppercase tracking-widest border-l-4 border-purple-500 pl-4">Unit Activity Timeline (7D)</h3>
                        <button onclick="resetTimeline()" id="reset-filter" class="hidden text-[10px] font-black text-sky-500 hover:text-white uppercase tracking-widest transition">Reset Filter ↺</button>
                    </div>
                    <canvas id="timelineChart" height="150"></canvas>
                </div>
            </div>
        </div>

        <!-- Tab 2: Operators -->
        <section id="section-ops" class="hidden space-y-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Personnel Roster</h2>
                <span id="op-count" class="text-[10px] font-bold text-sky-500 uppercase tracking-widest">0 Active Personnel</span>
            </div>
            <div id="operator-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Tab 3: Intelligence -->
        <section id="section-intel" class="hidden space-y-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Intelligence Logs</h2>
                <span id="intel-count" class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">0 Detection Events</span>
            </div>
            <div id="intel-grid" class="space-y-4"></div>
        </section>

    </main>

    <!-- Detail Modal -->
    <div id="profile-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative glass-card rounded-[2.5rem] w-full max-w-5xl max-h-[85vh] overflow-y-auto p-12 shadow-2xl border-t-sky-500 border-t-2">
            <button onclick="closeModal()" class="absolute top-10 right-10 text-slate-500 hover:text-white transition">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://cnjkdxfurpagssimmmtq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuamtkeGZ1cnBhZ3NzaW1tbXRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzU4MzksImV4cCI6MjA5MDUxMTgzOX0.jpqX54brUMKOCC-H85ZRsZ5NkFQ0m-75FkosfY_VGX0";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let unitData = [];
        let timelineChart = null;
        let fleetChartInstance = null;

        const DRONE_COLORS = {
            'MAVIC 3E': '#38bdf8', 'DJI AVATA': '#10b981', 'MATRICE 350': '#a855f7', 'AUTEL EVO': '#f59e0b', 'UNKNOWN': '#64748b'
        };

        async function init() {
            const { data, error } = await _supabase.from('drons').select('*').order('takeoff_time', { ascending: false });
            if (error) return;
            unitData = data;
            processAndRender();
        }

        function processAndRender() {
            const ops = {}; const fleet = {}; const intelRows = [];
            let totalMins = 0; let totalDet = 0;
            
            unitData.forEach(log => {
                const dur = Math.round((new Date(log.landing_time) - new Date(log.takeoff_time)) / (1000 * 60));
                const model = (log.drone_model || "UNKNOWN").trim().toUpperCase();
                totalMins += dur; if (log.has_detection) { totalDet++; intelRows.push(log); }

                if (!ops[log.operator_name]) ops[log.operator_name] = { name: log.operator_name, quals: log.qualifications || "Standard", logs: [], total: 0 };
                ops[log.operator_name].total += dur;
                ops[log.operator_name].logs.push({ ...log, duration: dur });

                if (!fleet[model]) fleet[model] = { total: 0 };
                fleet[model].total += dur;
            });

            document.getElementById('stat-time').innerHTML = `${totalMins} <span class="text-sm font-normal label-gray lowercase">min</span>`;
            document.getElementById('stat-detections').innerText = totalDet;
            document.getElementById('stat-assets').innerText = Object.keys(fleet).length;
            document.getElementById('stat-rate').innerText = Math.round((totalDet / unitData.length) * 100) + '%';

            renderOperators(ops);
            renderDoughnutChart(fleet);
            renderTimelineChart();
            renderIntelligence(intelRows);
        }

        function renderOperators(ops) {
            const grid = document.getElementById('operator-grid');
            grid.innerHTML = '';
            Object.values(ops).forEach(op => {
                const card = document.createElement('div');
                card.onclick = () => showModal(op);
                card.className = "glass-card rounded-2xl p-6 border-l-4 border-sky-500 hover:scale-[1.02] cursor-pointer transition shadow-xl";
                card.innerHTML = `
                    <h3 class="text-xl data-white mb-6 uppercase tracking-tight italic">${op.name}</h3>
                    <div class="mb-6">
                        <p class="text-[9px] font-bold label-gray uppercase tracking-[0.2em] mb-2">Qualifications:</p>
                        <div class="flex flex-wrap gap-1.5">${op.quals.split(',').map(q => `<span class="px-2 py-0.5 rounded bg-slate-800 text-slate-400 text-[9px] font-bold uppercase border border-slate-700">${q.trim()}</span>`).join('')}</div>
                    </div>
                    <div class="border-t border-slate-800 pt-4">
                        <p class="text-[10px] label-gray uppercase tracking-widest font-bold italic">Total Airtime: <span class="data-white">${op.total} min</span></p>
                    </div>`;
                grid.appendChild(card);
            });
            document.getElementById('op-count').innerText = `${Object.keys(ops).length} Active Personnel`;
        }

        function renderIntelligence(rows) {
            const grid = document.getElementById('intel-grid');
            grid.innerHTML = '';
            document.getElementById('intel-count').innerText = `${rows.length} Detection Events`;

            rows.forEach(log => {
                const item = document.createElement('div');
                item.className = "glass-card p-6 rounded-2xl border-l-4 border-amber-500 shadow-lg";
                item.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="space-y-1">
                            <div class="flex items-center space-x-3 mb-1">
                                <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Active Intel</span>
                                <span class="text-[10px] label-gray mono">${new Date(log.takeoff_time).toLocaleString()}</span>
                            </div>
                            <div class="p-4 rounded-xl intel-report">
                                <p class="text-white font-medium text-sm leading-relaxed">${log.detection_notes || 'Suspicious signatures recorded during flight.'}</p>
                            </div>
                        </div>
                        <div class="md:text-right flex-shrink-0">
                            <p class="text-[10px] label-gray uppercase font-bold tracking-widest mb-1">Mission Credentials</p>
                            <p class="text-sm data-white uppercase">${log.operator_name}</p>
                            <p class="text-xs text-sky-400 font-bold uppercase tracking-tighter">${log.drone_model}</p>
                        </div>
                    </div>`;
                grid.appendChild(item);
            });
        }

        function renderDoughnutChart(fleet) {
            const ctx = document.getElementById('fleetChart').getContext('2d');
            const labels = Object.keys(fleet);
            if (fleetChartInstance) fleetChartInstance.destroy();
            fleetChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: labels.map(l => fleet[l].total),
                        backgroundColor: labels.map(l => DRONE_COLORS[l] || '#ec4899'),
                        borderWidth: 0, hoverOffset: 20
                    }]
                },
                options: {
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { weight: 'bold', size: 10 } } } },
                    onClick: (evt, elements) => { if (elements.length > 0) filterTimeline(labels[elements[0].index]); }
                }
            });
        }

        function renderTimelineChart(modelFilter = null) {
            const ctx = document.getElementById('timelineChart').getContext('2d');
            if (timelineChart) timelineChart.destroy();
            const last7Days = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toISOString().split('T')[0]; }).reverse();
            const dayData = last7Days.map(day => unitData.filter(l => l.takeoff_time.startsWith(day) && (modelFilter ? (l.drone_model || "").trim().toUpperCase() === modelFilter : true)).reduce((sum, l) => sum + Math.round((new Date(l.landing_time) - new Date(l.takeoff_time)) / (1000 * 60)), 0));
            timelineChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: last7Days.map(d => d.split('-').slice(1).join('/')),
                    datasets: [{ label: 'Minutes', data: dayData, backgroundColor: modelFilter ? DRONE_COLORS[modelFilter] : '#a855f7', borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' }, beginAtZero: true }, x: { grid: { display: false }, ticks: { color: '#64748b' } } }, plugins: { legend: { display: false } } }
            });
        }

        function filterTimeline(model) { document.getElementById('timeline-title').innerText = `Timeline: ${model}`; document.getElementById('reset-filter').classList.remove('hidden'); renderTimelineChart(model); }
        function resetTimeline() { document.getElementById('timeline-title').innerText = `Unit Activity Timeline (7D)`; document.getElementById('reset-filter').classList.add('hidden'); renderTimelineChart(null); }

        function switchTab(tab) {
            const sections = { fleet: document.getElementById('section-fleet'), ops: document.getElementById('section-ops'), intel: document.getElementById('section-intel') };
            const navs = { fleet: document.getElementById('nav-fleet'), ops: document.getElementById('nav-ops'), intel: document.getElementById('nav-intel') };
            Object.keys(sections).forEach(k => {
                sections[k].classList.add('hidden');
                navs[k].className = "text-slate-500 h-16 text-xs font-black uppercase tracking-widest transition";
            });
            sections[tab].classList.remove('hidden');
            navs[tab].className = "nav-link-active h-16 text-xs font-black uppercase tracking-widest transition";
            if (tab === 'fleet') { if (timelineChart) timelineChart.resize(); if (fleetChartInstance) fleetChartInstance.resize(); }
        }

        function showModal(op) {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="mb-10"><h2 class="text-6xl font-black text-white uppercase italic tracking-tighter mb-2">${op.name}</h2><div class="flex items-center space-x-2 mb-8"><p class="text-xs font-bold label-gray uppercase tracking-widest font-black">TOTAL AIRTIME:</p><p class="text-2xl data-white uppercase">${op.total} min</p></div><p class="text-[9px] font-bold label-gray uppercase tracking-[0.2em] mb-3">QUALIFICATIONS:</p><div class="flex flex-wrap gap-2">${op.quals.split(',').map(q => `<span class="px-4 py-1.5 rounded-xl border border-sky-500/20 bg-sky-500/10 text-sky-400 text-[10px] font-black uppercase">${q.trim()}</span>`).join('')}</div></div>
                <div class="space-y-6"><h4 class="text-xs font-bold label-gray uppercase tracking-widest border-b border-slate-800 pb-2">Mission Log</h4><div class="space-y-3">${op.logs.map((l, i) => `
                    <div class="p-5 rounded-2xl border border-slate-800 bg-slate-900/40"><div class="flex justify-between items-center"><div><p class="text-sm data-white uppercase">${l.drone_model}</p><p class="text-[10px] label-gray font-mono">${new Date(l.takeoff_time).toLocaleString()}</p></div><div class="flex items-center space-x-6"><p class="text-xs data-white font-bold">${l.duration} MIN</p>${l.has_detection ? `<button onclick="event.stopPropagation(); toggleIntel(${i})" class="w-8 h-8 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-500 hover:bg-amber-500 hover:text-slate-900 transition"><span class="font-bold">!</span></button>` : '<div class="w-8"></div>'}</div></div><div id="intel-${i}" class="expandable-content"><div class="p-4 rounded-xl intel-report"><p class="text-[9px] font-black text-amber-500 uppercase mb-1 tracking-widest">Intelligence Notes</p><p class="text-sm text-slate-300 leading-relaxed">${l.detection_notes}</p><button onclick="toggleIntel(${i})" class="text-[9px] font-bold label-gray uppercase hover:text-white mt-3 block underline tracking-widest">Show Less</button></div></div></div>`).join('')}</div></div>`;
            document.getElementById('profile-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        window.toggleIntel = (i) => document.getElementById(`intel-${i}`).classList.toggle('open');
        window.closeModal = () => { document.getElementById('profile-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; };
        init();
    </script>
</body>
</html>
