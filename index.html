<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Drone Ops Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #cbd5e1; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .nav-link-active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .intel-alert { border-left: 3px solid #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden scroll-hide">

    <!-- Advanced Navigation -->
    <nav class="sticky top-0 z-40 glass-card border-b border-slate-800 px-8 h-20 flex items-center justify-between">
        <div class="flex items-center space-x-8">
            <div class="flex flex-col">
                <h1 class="text-xl font-black text-white tracking-tighter italic uppercase leading-none">Command Center</h1>
                <span class="text-[9px] text-sky-500 font-bold tracking-[0.3em]">UNIT INTELLIGENCE</span>
            </div>
            <div class="h-10 w-[1px] bg-slate-800"></div>
            <div class="flex space-x-6">
                <button onclick="switchTab('ops')" id="nav-ops" class="nav-link-active py-2 text-xs font-black uppercase tracking-widest transition">Personnel</button>
                <button onclick="switchTab('fleet')" id="nav-fleet" class="py-2 text-xs font-black uppercase tracking-widest text-slate-500 transition">Fleet Analysis</button>
                <button onclick="switchTab('intel')" id="nav-intel" class="py-2 text-xs font-black uppercase tracking-widest text-slate-500 transition">Intel Feed</button>
            </div>
        </div>

        <div class="flex items-center space-x-6">
            <div class="relative">
                <input type="text" id="globalSearch" placeholder="SEARCH UNIT..." oninput="handleSearch()"
                       class="bg-slate-900/80 border border-slate-700 rounded-full px-5 py-2 text-xs font-bold text-white focus:outline-none focus:border-sky-500 w-64 transition-all">
            </div>
            <div id="status" class="text-[10px] font-black text-slate-500 uppercase flex items-center">
                <span class="w-2 h-2 bg-slate-600 rounded-full mr-2"></span> Handshake
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-8">
        
        <!-- Dashboard Summary Row -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass-card p-6 rounded-3xl border-b-4 border-b-sky-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Unit Airtime</p>
                <h4 id="stat-total-time" class="text-4xl font-black text-white">0 <span class="text-sm font-normal text-slate-600 lowercase">min</span></h4>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-4 border-b-amber-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Detection Events</p>
                <h4 id="stat-detections" class="text-4xl font-black text-white">0</h4>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-4 border-b-green-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Active Assets</p>
                <h4 id="stat-assets" class="text-4xl font-black text-white">0</h4>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-4 border-b-purple-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Detections Rate</p>
                <h4 id="stat-rate" class="text-4xl font-black text-white">0%</h4>
            </div>
        </div>

        <!-- Section: Personnel (Operators) -->
        <section id="section-ops" class="space-y-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-white uppercase italic">Active Roster</h2>
                <span id="op-count" class="text-[10px] font-bold text-sky-500 uppercase">0 MEMBERS</span>
            </div>
            <div id="operator-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Section: Fleet Analysis -->
        <section id="section-fleet" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 glass-card p-8 rounded-3xl">
                <h3 class="text-sm font-black text-white uppercase tracking-widest mb-8 border-l-4 border-sky-500 pl-4">Utilization Distribution</h3>
                <canvas id="fleetChart" height="300"></canvas>
            </div>
            <div class="lg:col-span-2 glass-card p-8 rounded-3xl">
                <h3 class="text-sm font-black text-white uppercase tracking-widest mb-8 border-l-4 border-purple-500 pl-4">Unit Activity Timeline (7D)</h3>
                <canvas id="timelineChart" height="150"></canvas>
            </div>
            <div class="lg:col-span-3">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-white uppercase italic">Fleet Assets</h2>
                    <span id="fleet-count" class="text-[10px] font-bold text-sky-500 uppercase">0 MODELS</span>
                </div>
                <div id="fleet-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
            </div>
        </section>

        <!-- Section: Intel Feed -->
        <section id="section-intel" class="hidden">
            <div class="max-w-4xl mx-auto space-y-4">
                <h3 class="text-xl font-black text-white uppercase italic mb-8">Intelligence Alert Feed</h3>
                <div id="intel-feed" class="space-y-4"></div>
            </div>
        </section>

    </main>

    <!-- Detailed Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative glass-card rounded-[2.5rem] w-full max-w-5xl max-h-[85vh] overflow-y-auto p-12 shadow-2xl border-t-sky-500 border-t-2">
            <button onclick="closeModal()" class="absolute top-10 right-10 text-slate-500 hover:text-white transition">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://cnjkdxfurpagssimmmtq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuamtkeGZ1cnBhZ3NzaW1tbXRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzU4MzksImV4cCI6MjA5MDUxMTgzOX0.jpqX54brUMKOCC-H85ZRsZ5NkFQ0m-75FkosfY_VGX0";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let unitData = [];
        let operators = {};
        let fleet = {};

        async function init() {
            const { data, error } = await _supabase.from('drons').select('*').order('takeoff_time', { ascending: false });
            if (error) return;
            unitData = data;
            document.getElementById('status').innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full mr-2 shadow-[0_0_8px_#22c55e]"></span> Live Uplink`;
            processData();
        }

        function processData() {
            operators = {}; fleet = {};
            let totalMins = 0; let totalDetections = 0;

            unitData.forEach(log => {
                const duration = Math.round((new Date(log.landing_time) - new Date(log.takeoff_time)) / (1000 * 60));
                const model = (log.drone_model || "UNKNOWN").trim().toUpperCase();
                totalMins += duration;
                if (log.has_detection) totalDetections++;

                // Ops Aggregation
                if (!operators[log.operator_name]) {
                    operators[log.operator_name] = { name: log.operator_name, quals: log.qualifications || "Standard", logs: [], total: 0 };
                }
                operators[log.operator_name].total += duration;
                operators[log.operator_name].logs.push({ ...log, duration });

                // Fleet Aggregation
                if (!fleet[model]) fleet[model] = { model, total: 0, count: 0 };
                fleet[model].total += duration;
                fleet[model].count++;
            });

            document.getElementById('stat-total-time').innerHTML = `${totalMins} <span class="text-sm font-normal text-slate-600 lowercase">min</span>`;
            document.getElementById('stat-detections').innerText = totalDetections;
            document.getElementById('stat-assets').innerText = Object.keys(fleet).length;
            document.getElementById('stat-rate').innerText = Math.round((totalDetections / unitData.length) * 100) + '%';

            renderUI();
            renderCharts();
            renderIntelFeed();
            renderFleetGrid();
        }

        function renderUI(filterText = "") {
            const grid = document.getElementById('operator-grid');
            const countLabel = document.getElementById('op-count');
            if(!grid || !countLabel) return;
            
            grid.innerHTML = '';
            const list = Object.values(operators).filter(op => 
                op.name.toLowerCase().includes(filterText.toLowerCase()) || 
                op.quals.toLowerCase().includes(filterText.toLowerCase())
            );

            countLabel.innerText = `${list.length} MEMBERS IN VIEW`;

            list.forEach(op => {
                const badge = op.total > 150 ? '<span class="bg-amber-500/10 text-amber-500 text-[8px] font-black px-2 py-0.5 rounded-full border border-amber-500/20 ml-2">ELITE PILOT</span>' : '';
                const card = document.createElement('div');
                card.onclick = () => openModal(op);
                card.className = "glass-card rounded-3xl p-6 border-l-4 border-sky-500 transition transform hover:scale-[1.03] active:scale-95 cursor-pointer group shadow-xl";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-black text-white uppercase group-hover:text-sky-400 transition tracking-tighter italic">${op.name}${badge}</h3>
                    </div>
                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${op.quals.split(',').map(q => `<span class="px-2 py-0.5 rounded text-[9px] font-bold bg-slate-800 text-slate-400 uppercase border border-slate-700">${q.trim()}</span>`).join('')}
                    </div>
                    <div class="flex items-end justify-between border-t border-slate-800 pt-4">
                        <div>
                            <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">Flight Time</p>
                            <p class="text-2xl font-black text-white">${op.total} <span class="text-xs text-slate-500 italic lowercase tracking-normal">min</span></p>
                        </div>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest group-hover:text-sky-500 transition">Profile ></span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderFleetGrid() {
            const grid = document.getElementById('fleet-grid');
            const countLabel = document.getElementById('fleet-count');
            if(!grid || !countLabel) return;

            grid.innerHTML = '';
            const list = Object.values(fleet);
            countLabel.innerText = `${list.length} MODELS ACTIVE`;

            list.forEach(f => {
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-3xl border border-slate-800 shadow-xl";
                card.innerHTML = `
                    <h3 class="text-lg font-black text-white uppercase tracking-tighter italic mb-4">${f.model}</h3>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">Total Airtime</p>
                            <p class="text-2xl font-black text-sky-400">${f.total} <span class="text-xs font-normal text-slate-500 lowercase">min</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">Flights</p>
                            <p class="text-xl font-black text-white">${f.count}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCharts() {
            const fleetCtx = document.getElementById('fleetChart')?.getContext('2d');
            if(fleetCtx) {
                new Chart(fleetCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(fleet),
                        datasets: [{
                            data: Object.values(fleet).map(f => f.total),
                            backgroundColor: ['#38bdf8', '#a855f7', '#10b981', '#f59e0b'],
                            borderWidth: 0,
                            hoverOffset: 15
                        }]
                    },
                    options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { weight: 'bold', size: 10 } } } } }
                });
            }

            const timeCtx = document.getElementById('timelineChart')?.getContext('2d');
            if(timeCtx) {
                const last7Days = [...Array(7)].map((_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    return d.toISOString().split('T')[0];
                }).reverse();

                const dayData = last7Days.map(day => {
                    return unitData.filter(l => l.takeoff_time.startsWith(day))
                                   .reduce((sum, l) => sum + Math.round((new Date(l.landing_time) - new Date(l.takeoff_time)) / (1000 * 60)), 0);
                });

                new Chart(timeCtx, {
                    type: 'bar',
                    data: {
                        labels: last7Days.map(d => d.split('-').slice(1).join('/')),
                        datasets: [{ label: 'Minutes', data: dayData, backgroundColor: '#a855f7', borderRadius: 8 }]
                    },
                    options: { 
                        scales: { 
                            y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                            x: { grid: { display: false }, ticks: { color: '#64748b' } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        }

        function renderIntelFeed() {
            const feed = document.getElementById('intel-feed');
            if(!feed) return;
            feed.innerHTML = '';
            unitData.filter(l => l.has_detection).slice(0, 10).forEach(l => {
                const item = document.createElement('div');
                item.className = "glass-card p-6 rounded-2xl intel-alert flex justify-between items-center shadow-lg";
                item.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center space-x-3 mb-1">
                            <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Active Intel</span>
                            <span class="text-[10px] text-slate-500 mono">${new Date(l.takeoff_time).toLocaleString()}</span>
                        </div>
                        <p class="text-white font-medium text-sm mb-1">${l.detection_notes || 'Suspicious heat signature detected.'}</p>
                        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Asset: ${l.drone_model} | Operator: ${l.operator_name}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-amber-500/10 flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-9 5.29C1 12.8 5.61 17.5 10 19s9-6.2 9-11.71A6 6 0 0010 2zm0 14.5c-3 0-5-2-5-4.5s2-4.5 5-4.5 5 2 5 4.5-2 4.5-5 4.5z"/></svg>
                    </div>
                `;
                feed.appendChild(item);
            });
        }

        function handleSearch() {
            const text = document.getElementById('globalSearch').value;
            renderUI(text);
        }

        function switchTab(tab) {
            document.getElementById('section-ops').classList.toggle('hidden', tab !== 'ops');
            document.getElementById('section-fleet').classList.toggle('hidden', tab !== 'fleet');
            document.getElementById('section-intel').classList.toggle('hidden', tab !== 'intel');
            
            document.getElementById('nav-ops').className = tab === 'ops' ? 'nav-link-active py-2 text-xs font-black uppercase tracking-widest text-white' : 'py-2 text-xs font-black uppercase tracking-widest text-slate-500';
            document.getElementById('nav-fleet').className = tab === 'fleet' ? 'nav-link-active py-2 text-xs font-black uppercase tracking-widest text-white' : 'py-2 text-xs font-black uppercase tracking-widest text-slate-500';
            document.getElementById('nav-intel').className = tab === 'intel' ? 'nav-link-active py-2 text-xs font-black uppercase tracking-widest text-white' : 'py-2 text-xs font-black uppercase tracking-widest text-slate-500';
        }

        function openModal(op) {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="mb-10">
                    <p class="text-sky-500 font-black text-xs uppercase tracking-[0.4em] mb-2">Personnel Dossier</p>
                    <h2 class="text-6xl font-black text-white uppercase tracking-tighter mb-4 italic">${op.name}</h2>
                    <div class="flex space-x-3">
                        ${op.quals.split(',').map(q => `<span class="px-4 py-1.5 rounded-xl border border-slate-700 bg-slate-900 text-[10px] font-black text-slate-400 uppercase">${q.trim()}</span>`).join('')}
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Recent Mission Sequence</h4>
                    ${op.logs.map(l => `
                        <div class="p-5 bg-slate-900/50 rounded-2xl border border-slate-800 flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-white mb-0.5 uppercase tracking-tighter">${l.drone_model}</p>
                                <p class="text-[10px] text-slate-500 mono">${new Date(l.takeoff_time).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-white leading-none">${l.duration} <span class="text-[10px] font-normal text-slate-500 italic">min</span></p>
                                ${l.has_detection ? '<span class="text-[8px] bg-amber-500/20 text-amber-500 font-black px-1.5 py-0.5 rounded uppercase mt-1 inline-block">INTEL RECORDED</span>' : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('profile-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('profile-modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
